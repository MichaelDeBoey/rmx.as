name: ✨ Format Redirects

on:
  push:
    branches:
      - main
    paths:
      - "_redirects"

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎨 Format _redirects
        run: npm run format

      - name: 💾 Commit if formatting changed
        run: |
          if git diff --quiet _redirects; then
            echo "No formatting changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _redirects
          git commit -m "Format _redirects"
          git push
